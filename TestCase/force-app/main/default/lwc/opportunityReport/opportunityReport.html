<template>
    <lightning-card title="Opportunity Report" icon-name="standard:opportunity">
        <div slot="actions">
            <lightning-combobox
                    name="budgetYear"
                    label="Year"
                    value={budgetYear}
                    options={yearOptions}
                    onchange={handleChange}>
            </lightning-combobox>
        </div>

        <div slot="actions">
            <lightning-combobox
                    name="stage"
                    label="Stage"
                    value={stage}
                    options={stageOptions}
                    onchange={handleStageChange}>
            </lightning-combobox>
        </div>

        <div slot="actions">
            <lightning-input
                    type="date"
                    name="closeDate"
                    label="Close Date"
                    value={closeDate}
                    onchange={handleCloseDateChange}>
            </lightning-input>
        </div>

        <div class="slds-p-around_medium">
            <lightning-datatable
                    key-field="Id"
                    data={tableRows}
                    columns={columns}
                    hide-checkbox-column>
            </lightning-datatable>
        </div>

        <template lwc:if={showSpinner}>
            <lightning-spinner alternative-text="Loading"></lightning-spinner>
        </template>
    </lightning-card>
</template>
